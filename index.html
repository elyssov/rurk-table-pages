<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0E0E14">
    <title>RURK · Table</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0E0E14;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #E6B800;
        }
        #boot {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #E6B800;
            opacity: 0.6;
            pointer-events: none;  /* НЕ блокируем clicks/input */
            z-index: -1;            /* за canvas'ом */
            background: #0E0E14;
        }
        canvas { background: #0E0E14; }
    </style>
</head>
<body>
    <div id="boot">RURK · загрузка…</div>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="peerSync.js"></script>
    <script src="rurkTable.js"></script>
    <script>
        // Убираем boot-div как только Compose canvas появится в body.
        const obs = new MutationObserver(() => {
            if (document.querySelector('canvas')) {
                const b = document.getElementById('boot');
                if (b) b.remove();
                obs.disconnect();
            }
        });
        obs.observe(document.body, { childList: true, subtree: true });
        // Failsafe: убрать через 8 сек в любом случае
        setTimeout(() => { const b = document.getElementById('boot'); if (b) b.remove(); }, 8000);
    </script>
</body>
</html>
